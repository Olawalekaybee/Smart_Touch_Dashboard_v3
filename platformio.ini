[platformio]
default_envs = esp32-8048S050C

[env]
platform = espressif32
framework = arduino
monitor_speed = 115200
monitor_rts = 0
monitor_dtr = 0
monitor_filters = esp32_exception_decoder

lib_deps =
    https://github.com/rzeldent/esp32-smartdisplay

build_flags =
    -DLV_CONF_INCLUDE_SIMPLE

[env:esp32-8048S050C]
board = esp32-8048S050C